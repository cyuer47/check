<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <title>Vragenlijst beheren</title>
    <link rel="stylesheet" href="assets/css/styles.css" />
    <link rel="icon" type="image/x-icon" href="assets/img/logo2.png" />
    <style>
      ul.vraag-lijst {
        list-style: none;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      ul.vraag-lijst li {
        background: var(--surface-container, #f8f8f8);
        padding: 10px 12px;
        border-radius: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }
      .vraag-info {
        display: flex;
        align-items: center;
        flex: 1;
        gap: 12px;
        flex-wrap: wrap;
      }
      .edit-input {
        border: none;
        background: transparent;
        font: inherit;
        outline: none;
        flex: 1;
        min-width: 200px;
      }
      .edit-input[name="edit_antwoord"] {
        color: gray;
      }
      .edit-btn,
      .save-btn,
      .delete-btn {
        all: unset;
        cursor: pointer;
        vertical-align: middle;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 4px;
        border-radius: 8px;
      }
      .edit-btn:hover,
      .save-btn:hover,
      .delete-btn:hover {
        background: rgba(0, 0, 0, 0.05);
      }
      .icon-group {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      /* Make action buttons more visible and add fallback text labels */
      .edit-btn,
      .save-btn,
      .delete-btn {
        min-width: 36px;
        min-height: 32px;
        display: inline-flex !important;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="row mb-20">
        <a id="back-link" class="btn-text">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            height="24px"
            viewBox="0 -960 960 960"
            width="24px"
            fill="var(--svg-icons)"
          >
            <path
              d="m368-417 202 202-90 89-354-354 354-354 90 89-202 202h466v126H368Z"
            />
          </svg>
        </a>
        <div class="flex-grow">
          <h1 class="app-title" id="lijst-naam"></h1>
          <div class="helper" id="klas-naam" class="mt-4"></div>
        </div>
        <button
          id="share-header-btn"
          title="Delen met vrienden"
          class="btn-secondary row"
        >
          🔗 Delen
        </button>
      </div>

      <!-- Quick Add Vraag Card -->
      <div class="card">
        <h3>Vraag toevoegen</h3>
        <form id="add-vraag-form">
          <label>Vraag</label>
          <input name="vraag" required />
          <label>Antwoord</label>
          <input name="antwoord" required />
          <button class="btn-primary" type="submit">Opslaan</button>
        </form>
      </div>
      <div style="height: 12px"></div>

      <!-- Vragen List (Primary Content) -->
      <div class="card">
        <h3>Vragen ({{ count }})</h3>
        <p class="helper" id="geen-vragen" style="display: none">
          Nog geen vragen in deze lijst.
        </p>
        <ul class="vraag-lijst" id="vraag-lijst"></ul>
      </div>
      <div style="height: 12px"></div>

      <!-- Sharing Section Header -->
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px">
        <!-- Share with Friends Card -->
        <div class="card">
          <h3>Delen met Vrienden</h3>
          <div
            style="
              display: flex;
              align-items: center;
              gap: 8px;
              margin-bottom: 12px;
            "
          >
            <input type="checkbox" id="share-with-friends" />
            <label
              for="share-with-friends"
              style="margin: 0; cursor: pointer; flex: 1"
              >Zichtbaar voor vrienden</label
            >
          </div>
          <a
            href="profile.html"
            id="manage-friends-link"
            class="btn-secondary"
            style="
              display: inline-block;
              padding: 6px 10px;
              text-decoration: none;
              font-size: 13px;
            "
          >
            Vrienden beheren →
          </a>
          <div
            id="shared-with-friends"
            style="
              display: none;
              margin-top: 12px;
              padding: 10px;
              background: var(--surface-container);
              border-radius: 8px;
            "
          >
            <p class="helper" style="margin: 0 0 8px 0; font-size: 12px">
              Gedeeld met:
            </p>
            <div
              id="friends-shared-list"
              style="display: flex; flex-direction: column; gap: 6px"
            ></div>
          </div>
        </div>

        <!-- Share via Link Card -->
        <div class="card">
          <h3>Delen via Link</h3>
          <p class="helper" style="font-size: 12px">
            Maak een deelbare link (optioneel met wachtwoord)
          </p>
          <div style="display: flex; gap: 6px; margin: 10px 0">
            <input
              type="password"
              id="link-password"
              placeholder="Wachtwoord (opt)"
              style="flex: 1; font-size: 12px"
            />
            <button
              id="create-link-btn"
              class="btn-primary"
              style="white-space: nowrap"
            >
              Link Maken
            </button>
          </div>
          <div
            id="links-list"
            style="display: flex; flex-direction: column; gap: 6px"
          >
            <div
              style="
                text-align: center;
                padding: 12px;
                color: var(--on-surface-variant);
                font-size: 12px;
              "
            >
              Laden...
            </div>
          </div>
        </div>
      </div>
      <div style="height: 12px"></div>

      <!-- CSV Section -->
      <div class="card">
        <h3>CSV Import / Export</h3>
        <div
          style="
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 12px;
          "
        >
          <button
            id="download-template-btn"
            class="btn-secondary"
            style="
              display: flex;
              align-items: center;
              gap: 6px;
              justify-content: center;
              font-size: 13px;
            "
          >
            📋 Template
          </button>
          <button
            id="export-csv-btn"
            class="btn-secondary"
            style="
              display: flex;
              align-items: center;
              gap: 6px;
              justify-content: center;
              font-size: 13px;
            "
          >
            📥 Exporteren
          </button>
        </div>
        <div
          style="
            border-top: 1px solid var(--outline-variant);
            padding-top: 10px;
          "
        >
          <label for="csv-import" style="font-size: 13px">CSV Importeren</label>
          <div style="display: flex; gap: 6px; margin-top: 6px">
            <input
              type="file"
              id="csv-import"
              accept=".csv, text/csv"
              style="flex: 1; font-size: 12px"
            />
            <button
              id="import-csv-btn"
              class="btn-primary"
              style="white-space: nowrap"
            >
              Importeren
            </button>
          </div>
          <div
            id="csv-import-errors"
            style="
              margin-top: 8px;
              display: none;
              padding: 10px;
              background: var(--error-container);
              border-radius: 6px;
              color: var(--on-error-container);
              font-size: 12px;
            "
          ></div>
          <div
            id="csv-import-success"
            style="
              margin-top: 8px;
              display: none;
              padding: 10px;
              background: var(--success-container);
              border-radius: 6px;
              color: var(--on-success-container);
              font-size: 12px;
            "
          ></div>
        </div>
      </div>
    </div>
    <script>
      const params = new URLSearchParams(window.location.search);
      const lijstId = params.get("id");
      if (!lijstId) {
        alert("Geen lijst gekozen");
        window.location = "dashboard.html";
      }
      const token = localStorage.getItem("token");
      if (!token) {
        window.location =
          "login.html?redirecturi=" +
          encodeURIComponent("manage_vragenlijst.html?id=" + lijstId);
      }
      const headers = {
        Authorization: "Bearer " + token,
        "Content-Type": "application/json",
      };
      let lijstData = null;
      function escapeHtml(str) {
        return str.replace(
          /[&<>'"]/g,
          (c) =>
            ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              "'": "&#39;",
              '"': "&quot;",
            })[c],
        );
      }
      async function fetchLijst() {
        const res = await fetch(`/vragenlijst/${lijstId}`, { headers });
        if (!res.ok) {
          alert("Geen rechten of lijst niet gevonden.");
          window.location = "dashboard.html";
          return;
        }
        lijstData = await res.json();
        document.getElementById("lijst-naam").textContent = lijstData.naam;
        document.getElementById("klas-naam").textContent =
          "Klas: " + lijstData.klasnaam;
        document.getElementById("back-link").href =
          "manage_klas.html?klas=" + lijstData.klas_id;
      }
      async function fetchVragen() {
        const res = await fetch(`/vragenlijst/${lijstId}`, { headers });
        if (!res.ok) {
          console.error(`/vragenlijst/${lijstId} fetch failed:`, res.status);
          return;
        }
        const data = await res.json();
        const vragen = data.vragen || [];
        const ul = document.getElementById("vraag-lijst");
        ul.innerHTML = "";
        const geenElem = document.getElementById("geen-vragen");
        if (vragen.length === 0) {
          if (geenElem) geenElem.style.display = "";
          return;
        }
        if (geenElem) geenElem.style.display = "none";
        vragen.forEach((q) => {
          const li = document.createElement("li");
          li.innerHTML = `
      <div class="vraag-info">
        <form class="edit-form" style="display:flex; flex:1; gap:10px; align-items:center;">
          <input type="hidden" name="edit_vraag_id" value="${q.id}">
          <input type="text" name="edit_vraag" value="${escapeHtml(
            q.vraag,
          )}" class="edit-input" readonly>
          <input type="text" name="edit_antwoord" value="${escapeHtml(
            q.antwoord,
          )}" class="edit-input" readonly>
          <div class="icon-group">
            <button type="button" class="edit-btn" title="Bewerken">
                  <svg xmlns='http://www.w3.org/2000/svg' height='22px' viewBox='0 -960 960 960' width='24px' fill='var(--on-primary-container)'><path d='M211-212h58l323-323-56-57-325 325v55ZM86-86v-234l526-526q14-14 31.5-21t36.5-7q18 0 36 7t33 21l98 96q14 14 21 32.5t7 37.5q0 19-7 37t-21 32L322-86H86Zm652-594-57-58 57 58ZM564-564l-28-28 56 57-28-29Z'/></svg>
            </button>
            <button type="submit" class="save-btn" title="Opslaan" style="display:none;">
                  <svg xmlns='http://www.w3.org/2000/svg' height='22px' viewBox='0 -960 960 960' width='22px' fill='var(--on-primary-container)'><path d='M874-694v482q0 53-36.5 89.5T748-86H212q-53 0-89.5-36.5T86-212v-536q0-53 36.5-89.5T212-874h482l180 180Zm-126 53L641-748H212v536h536v-429ZM480-252q50 0 85-35t35-85q0-50-35-85t-85-35q-50 0-85 35t-35 85q0 50 35 85t85 35ZM252-548h360v-160H252v160Zm-40-93v429-536 107Z'/></svg>
            </button>
          </div>
        </form>
        <form class="delete-form" style="margin-left:8px;">
          <input type="hidden" name="vraag_id" value="${q.id}">
          <button type="submit" class="delete-btn" title="Verwijderen">
<svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="var(--on-primary-container)">
                  <path d="M269-86q-53 0-89.5-36.5T143-212v-497H80v-126h257v-63h284v63h259v126h-63v497q0 53-36.5 89.5T691-86H269Zm422-623H269v497h422v-497ZM342-281h103v-360H342v360Zm173 0h103v-360H515v360ZM269-709v497-497Z"></path>
                </svg>          
              </button>
        </form>
      </div>
    `;
          ul.appendChild(li);
          // Edit logic (add cancel button dynamically, store originals and handle errors)
          const editBtn = li.querySelector(".edit-btn");
          const saveBtn = li.querySelector(".save-btn");
          const form = li.querySelector(".edit-form");
          const inputs = form.querySelectorAll(".edit-input");

          editBtn.onclick = () => {
            form.dataset.origVraag = inputs[0].value;
            form.dataset.origAntwoord = inputs[1].value;
            inputs.forEach((i) => i.removeAttribute("readonly"));
            inputs[0].focus();
            editBtn.style.display = "none";
            saveBtn.style.display = "inline-flex";
          };

          form.onsubmit = async (e) => {
            e.preventDefault();
            const vraag_id = form.edit_vraag_id.value;
            const nieuwe_vraag = form.edit_vraag.value.trim();
            const nieuw_antwoord = form.edit_antwoord.value.trim();
            if (!nieuwe_vraag || !nieuw_antwoord) return;
            try {
              saveBtn.disabled = true;
              const res = await fetch(`/vragen/${vraag_id}`, {
                method: "PUT",
                headers,
                body: JSON.stringify({
                  vraag: nieuwe_vraag,
                  antwoord: nieuw_antwoord,
                }),
              });
              if (res.status === 401) {
                alert("Niet ingelogd. Log in en probeer opnieuw.");
                window.location =
                  "login.html?redirecturi=" +
                  encodeURIComponent(
                    window.location.pathname + window.location.search,
                  );
                return;
              }
              if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                alert("Fout bij opslaan: " + (err.error || res.status));
                return;
              }
              fetchVragen();
            } catch (err) {
              alert("Netwerkfout bij opslaan: " + err);
            } finally {
              saveBtn.disabled = false;
            }
          };
          // Delete logic with error handling
          const deleteForm = li.querySelector(".delete-form");
          deleteForm.onsubmit = async (e) => {
            e.preventDefault();
            if (!confirm("Weet je zeker dat je deze vraag wilt verwijderen?"))
              return;
            const vraag_id = deleteForm.vraag_id.value;
            try {
              const res = await fetch(`/vragen/${vraag_id}`, {
                method: "DELETE",
                headers,
              });
              if (res.status === 401) {
                alert("Niet ingelogd. Log in en probeer opnieuw.");
                window.location =
                  "login.html?redirecturi=" +
                  encodeURIComponent(
                    window.location.pathname + window.location.search,
                  );
                return;
              }
              if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                alert("Fout bij verwijderen: " + (err.error || res.status));
                return;
              }
              fetchVragen();
            } catch (err) {
              alert("Netwerkfout bij verwijderen: " + err);
            }
          };
        });
      }
      document.getElementById("add-vraag-form").onsubmit = async (e) => {
        e.preventDefault();
        const vraag = e.target.vraag.value.trim();
        const antwoord = e.target.antwoord.value.trim();
        if (!vraag || !antwoord) return;
        try {
          const res = await fetch(`/vragenlijst/${lijstId}/vraag`, {
            method: "POST",
            headers,
            body: JSON.stringify({ vraag, antwoord }),
          });
          console.log("/vragenlijst POST", res.status);
          if (res.status === 401) {
            alert("Niet ingelogd. Log in en probeer opnieuw.");
            window.location =
              "login.html?redirecturi=" +
              encodeURIComponent(
                window.location.pathname + window.location.search,
              );
            return;
          }
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            alert("Fout bij toevoegen: " + (err.error || res.status));
            return;
          }
          e.target.reset();
          fetchVragen();
        } catch (err) {
          alert("Netwerkfout bij toevoegen vraag: " + err);
        }
      };

      // Sharing functionality
      async function loadSharingStatus() {
        try {
          // Load friends
          const friendsRes = await fetch("/friends", { headers });
          if (!friendsRes.ok) return;
          const friendsData = await friendsRes.json();

          // Load sharing status
          const shareRes = await fetch(`/vragenlijst/${lijstId}/shares`, {
            headers,
          });
          const isShared = shareRes.ok ? (await shareRes.json()).shared : false;

          const checkbox = document.getElementById("share-with-friends");
          const sharedContainer = document.getElementById(
            "shared-with-friends",
          );
          const friendsList = document.getElementById("friends-shared-list");

          checkbox.checked = isShared;

          if (friendsData.friends && friendsData.friends.length > 0) {
            if (isShared) {
              sharedContainer.style.display = "";
              friendsList.innerHTML = friendsData.friends
                .map(
                  (friend) => `
                <div style="padding: 8px; background: var(--surface); border-radius: 6px; font-size: 14px;">
                  ${escapeHtml(friend.naam)} (${escapeHtml(friend.email)})
                </div>
              `,
                )
                .join("");
            }
          } else {
            checkbox.disabled = true;
            friendsList.innerHTML =
              '<p style="color: var(--on-surface-variant); margin: 0; font-size: 12px;">Voeg eerst vrienden toe om te kunnen delen.</p>';
          }
        } catch (err) {
          console.error("Error loading sharing status:", err);
        }
      }

      document
        .getElementById("share-with-friends")
        .addEventListener("change", async (e) => {
          const isChecked = e.target.checked;
          try {
            const res = await fetch(`/vragenlijst/${lijstId}/toggle-share`, {
              method: "POST",
              headers,
              body: JSON.stringify({ shared: isChecked }),
            });
            if (res.ok) {
              const sharedContainer = document.getElementById(
                "shared-with-friends",
              );
              if (isChecked) {
                sharedContainer.style.display = "";
              } else {
                sharedContainer.style.display = "none";
              }
              showToast(
                isChecked ? "Gedeeld met vrienden!" : "Niet meer gedeeld",
              );
            } else {
              e.target.checked = !isChecked;
              showToast("Fout bij delen");
            }
          } catch (err) {
            console.error(err);
            e.target.checked = !isChecked;
            showToast("Fout bij delen");
          }
        });

      function showToast(message) {
        const toast = document.createElement("div");
        toast.style.cssText = `
          position: fixed;
          bottom: 20px;
          right: 20px;
          background: var(--primary);
          color: var(--on-primary);
          padding: 16px 24px;
          border-radius: 8px;
          z-index: 10000;
          animation: slideUp 0.3s ease;
        `;
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
      }

      // CSV Functions
      function downloadTemplate() {
        // Download server-hosted template for clarity
        window.location = "/template.csv";
      }

      function downloadCSV() {
        const vragen = document.querySelectorAll("ul.vraag-lijst li");
        if (vragen.length === 0) {
          showToast("Geen vragen om te exporteren");
          return;
        }

        let csv = "Vraag,Antwoord\n";
        vragen.forEach((li) => {
          const vraag = li.querySelector('input[name="edit_vraag"]').value;
          const antwoord = li.querySelector(
            'input[name="edit_antwoord"]',
          ).value;
          csv +=
            '"' +
            vraag.replace(/"/g, '""') +
            '","' +
            antwoord.replace(/"/g, '""') +
            '"\n';
        });

        const blob = new Blob([csv], { type: "text/csv" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `${lijstData.naam || "vragenlijst"}.csv`;
        a.click();
      }

      async function importCSV(file) {
        const text = await file.text();
        const lines = text
          .split("\n")
          .map((l) => l.trim())
          .filter((l) => l);

        if (lines.length < 2) {
          showError("CSV moet minimaal een header + 1 vraag bevatten");
          return;
        }

        const header = lines[0].split(",").map((h) => h.trim());
        if (
          header.length < 2 ||
          header[0].toLowerCase() !== "vraag" ||
          header[1].toLowerCase() !== "antwoord"
        ) {
          showError(
            'CSV moet kolommen "Vraag" en "Antwoord" hebben (gescheiden door komma)',
          );
          return;
        }

        const errors = [];
        let imported = 0;

        for (let i = 1; i < lines.length; i++) {
          const [vraag, antwoord] = lines[i]
            .split(",")
            .slice(0, 2)
            .map((s) => s.trim().replace(/^"(.*)"$/, "$1"));

          if (!vraag || !antwoord) {
            errors.push(`Rij ${i + 1}: Vraag en antwoord zijn verplicht`);
            continue;
          }

          try {
            const res = await fetch(`/vragenlijst/${lijstId}/vraag`, {
              method: "POST",
              headers,
              body: JSON.stringify({ vraag, antwoord }),
            });
            if (res.ok) {
              imported++;
            } else {
              errors.push(`Rij ${i + 1}: Fout bij opslaan`);
            }
          } catch (err) {
            errors.push(`Rij ${i + 1}: ${err.message}`);
          }
        }

        if (errors.length > 0) {
          showError("Fouten: " + errors.join("; "));
        }
        if (imported > 0) {
          showSuccess(`${imported} vragen geïmporteerd!`);
          fetchVragen();
        }
      }

      function showError(msg) {
        const el = document.getElementById("csv-import-errors");
        el.textContent = msg;
        el.style.display = "";
        document.getElementById("csv-import-success").style.display = "none";
      }

      function showSuccess(msg) {
        const el = document.getElementById("csv-import-success");
        el.textContent = msg;
        el.style.display = "";
        document.getElementById("csv-import-errors").style.display = "none";
      }

      // Link sharing functions
      async function loadLinks() {
        try {
          const res = await fetch(`/vragenlijst/${lijstId}/share-links`, {
            headers,
          });
          if (!res.ok) return;

          const data = await res.json();
          const list = document.getElementById("links-list");
          const links = data.links || [];

          if (links.length === 0) {
            list.innerHTML =
              '<p style="text-align: center; color: var(--on-surface-variant); padding: 12px; margin: 0; font-size: 12px;">Nog geen links gemaakt.</p>';
            return;
          }

          list.innerHTML = links
            .map(
              (link) => `
            <div style="padding: 10px; background: var(--surface-container); border-radius: 8px; display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap;">
              <div style="flex: 1; min-width: 150px;">
                <div style="font-size: 11px; color: var(--on-surface-variant); margin-bottom: 4px;">
                  ${link.password_hash ? "🔒 Beveiligd" : "🔓 Openbaar"}
                </div>
                <code style="word-break: break-all; font-size: 10px; color: var(--on-surface-variant); background: var(--surface); padding: 4px; border-radius: 4px; display: block;">
                  /share/${link.token}
                </code>
              </div>
              <div style="display: flex; gap: 4px; white-space: nowrap;">
                <button onclick="window.open('/share/${link.token}', '_blank')" style="padding: 6px 10px; font-size: 12px; background: var(--primary); color: var(--on-primary); border: none; border-radius: 4px; cursor: pointer;">
                  👁 Bekijken
                </button>
                <button onclick="copyLink('${link.token}')" style="padding: 6px 8px; font-size: 12px; background: var(--secondary); color: var(--on-secondary); border: none; border-radius: 4px; cursor: pointer;" title="Link kopiëren">
                  📋
                </button>
                <button onclick="deleteLink('${link.id}')" style="padding: 6px 8px; font-size: 12px; background: var(--error); color: var(--on-error); border: none; border-radius: 4px; cursor: pointer;" title="Link verwijderen">
                  🗑
                </button>
              </div>
            </div>
          `,
            )
            .join("");
        } catch (err) {
          console.error("Error loading links:", err);
        }
      }

      function copyLink(token) {
        const url = `${window.location.origin}/share/${token}`;
        navigator.clipboard.writeText(url).then(() => {
          showToast("Link gekopieerd!");
        });
      }

      async function deleteLink(linkId) {
        if (!confirm("Link verwijderen?")) return;

        try {
          const res = await fetch(
            `/vragenlijst/${lijstId}/share-links/${linkId}`,
            {
              method: "DELETE",
              headers,
            },
          );
          if (res.ok) {
            showToast("Link verwijderd!");
            loadLinks();
          } else {
            showToast("Fout bij verwijderen");
          }
        } catch (err) {
          console.error(err);
          showToast("Fout bij verwijderen");
        }
      }

      async function createLink() {
        const password = document.getElementById("link-password").value.trim();
        try {
          const res = await fetch(`/vragenlijst/${lijstId}/create-share-link`, {
            method: "POST",
            headers,
            body: JSON.stringify({ password: password || null }),
          });
          if (res.ok) {
            document.getElementById("link-password").value = "";
            showToast("Link gemaakt!");
            loadLinks();
          } else {
            const err = await res.json();
            showToast(err.error || "Fout bij maken van link");
          }
        } catch (err) {
          console.error(err);
          showToast("Fout bij maken van link");
        }
      }

      // Event listeners for CSV
      document.addEventListener("DOMContentLoaded", () => {
        const downloadTemplateBtn = document.getElementById(
          "download-template-btn",
        );
        const exportCsvBtn = document.getElementById("export-csv-btn");
        const importCsvBtn = document.getElementById("import-csv-btn");
        const csvImport = document.getElementById("csv-import");
        const createLinkBtn = document.getElementById("create-link-btn");

        if (downloadTemplateBtn) {
          downloadTemplateBtn.addEventListener("click", downloadTemplate);
        }
        if (exportCsvBtn) {
          exportCsvBtn.addEventListener("click", downloadCSV);
        }
        if (importCsvBtn && csvImport) {
          importCsvBtn.addEventListener("click", () => {
            if (!csvImport.files[0]) {
              showError("Selecteer een CSV bestand");
              return;
            }
            importCSV(csvImport.files[0]);
          });
        }
        if (createLinkBtn) {
          createLinkBtn.addEventListener("click", createLink);
        }
      });

      window.onload = async () => {
        await fetchLijst();
        await fetchVragen();
        await loadSharingStatus();
        await loadLinks();
      };

      // Wire header share button to toggle the share checkbox
      document.addEventListener("DOMContentLoaded", () => {
        const headerBtn = document.getElementById("share-header-btn");
        const checkbox = document.getElementById("share-with-friends");
        if (headerBtn && checkbox) {
          headerBtn.addEventListener("click", () => {
            checkbox.checked = !checkbox.checked;
            checkbox.dispatchEvent(new Event("change"));
            // ensure the share panel is visible when enabling
            if (checkbox.checked)
              document.getElementById("shared-with-friends").style.display = "";
          });
        }
      });
    </script>
  </body>
</html>
