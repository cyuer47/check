<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <title>Boek Viewer</title>
    <link rel="stylesheet" href="assets/css/styles.css" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
  </head>
  <body>
    <div class="container card" style="max-width: 900px; margin: 40px auto">
      <h2 id="title">Boek laden...</h2>
      <p id="desc"></p>
      <div id="content">
        Als het boek geladen is, verschijnen hier de hoofdstukken.
      </div>
      <div style="margin-top: 12px">
        <a href="dashboard.html">Terug naar dashboard</a>
      </div>
    </div>
    <script>
      (async function () {
        const token = localStorage.getItem("token");
        if (!token) return (window.location = "login.html");
        try {
          const res = await fetch("/my-current-ebook", {
            headers: { Authorization: "Bearer " + token },
          });
          if (!res.ok) {
            document.getElementById("title").textContent =
              "Kon boek niet laden";
            return;
          }
          const j = await res.json();
          if (!j.id) {
            document.getElementById("title").textContent =
              "Geen boek geselecteerd";
            return;
          }
          document.getElementById("title").textContent =
            j.book?.titel || "Onbekend boek";
          document.getElementById("desc").textContent =
            j.book?.omschrijving || "";
          // display book content if it was included by the API
          const contentEl = document.getElementById("content");
          async function renderContent(data) {
            if (!data) {
              contentEl.innerHTML =
                '<p class="helper">Boekinhoud niet beschikbaar.</p>';
              return;
            }
            if (Array.isArray(data.chapters)) {
              contentEl.innerHTML = "";
              data.chapters.forEach((ch, idx) => {
                const h = document.createElement("h3");
                h.textContent = ch.title || `Hoofdstuk ${idx + 1}`;
                contentEl.appendChild(h);
                const p = document.createElement("p");
                p.textContent = ch.content || "";
                contentEl.appendChild(p);
              });
            } else {
              contentEl.textContent = JSON.stringify(data, null, 2);
              contentEl.style.whiteSpace = "pre-wrap";
            }
          }
          if (j.content) {
            await renderContent(j.content);
          } else if (j.book && j.book.bestand) {
            // try fetching file by name
            try {
              const res2 = await fetch(`/ebooks/${j.book.bestand}`);
              if (res2.ok) {
                const fileData = await res2.json();
                await renderContent(fileData);
              } else {
                await renderContent(null);
              }
            } catch (e) {
              console.warn("could not fetch ebook file separately", e);
              await renderContent(null);
            }
          } else {
            await renderContent(null);
          }
        } catch (err) {
          document.getElementById("title").textContent = "Fout bij laden";
          console.error(err);
        }
      })();
    </script>
  </body>
</html>
